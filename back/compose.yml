name: chat-backend

services:
  chat-db-migrations:
    build: .
    command: pnpm migrate deploy
    environment:
      - POSTGRESQL_URL=postgresql://chat:chat@chat-db:5432/chatdb
    depends_on:
      chat-db:
        condition: service_healthy

  chat-api:
    build: .
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    ports:
      - ${PORT}:80
    environment:
      - PORT=80
      - APP_ID=${APP_ID}
      - AUTH_API_URL=${AUTH_API_URL}
      - POSTGRESQL_URL=postgresql://chat:chat@chat-db:5432/chatdb
    networks:
      - shared
      - default
    depends_on:
      chat-db-migrations:
        condition: service_completed_successfully
      chat-db:
        condition: service_healthy

  chat-db:
    image: postgres:18-alpine
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

    volumes:
      - chat-db-data:/var/lib/postgresql
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat

volumes:
  chat-db-data:

networks:
  shared:
    external: true
    name: auth-internal-network
