services:
  api:
    build: .
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    ports:
      - ${PORT}:80
    environment:
      - PORT=80
      - SQLITE_DB_PATH=/db/database.db
      - APP_ID=${APP_ID}
      - AUTH_API_URL=${AUTH_API_URL}
    volumes:
      - database-data:/db
    networks:
      - shared
      - default

volumes:
  database-data:

networks:
  shared:
    external: true
    name: auth-internal-network
